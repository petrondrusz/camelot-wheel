<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Camelot Wheel · guitar cheat sheet</title>
<meta name="description" content="Interactive Camelot wheel for guitarists — keys, compatible transitions and the root-note position on the fretboard.">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="app">
  <header class="head">
    <h1>Camelot<span class="grad">Wheel</span></h1>
  </header>

  <section class="wheel-wrap" aria-label="Camelot wheel">
    <svg id="wheel" viewBox="4 4 392 392" role="application" aria-label="Camelot wheel — key selector">
      <title>Camelot wheel</title>
      <desc>Twelve segments in two rings. The outer B ring holds major keys, the inner A ring minor keys. Tap to select a key.</desc>
    </svg>
  </section>

  <section class="compat" aria-label="Compatible keys">
    <div id="chips" class="chips" role="group" aria-label="Compatible keys for mixing"></div>
    <div id="chord-strip" class="chord-strip" aria-label="Detected chord progression" aria-live="polite"></div>
  </section>

  <section class="fret-card" aria-label="Fretboard position">
    <svg id="fret" viewBox="0 0 360 130" role="img" aria-label="Fretboard — root-note position on the E and A strings">
      <title>Fretboard</title>
      <desc>The low E and A strings with the root note of the selected key highlighted.</desc>
    </svg>
  </section>

  <div class="mic-wrap">
    <button id="mic" class="mic" type="button" aria-pressed="false" aria-label="Detect key from microphone — tap to start, tap again to stop">
      <span class="meter meter-left" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
      <svg class="mic-icon" viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
        <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
        <path d="M5 11a7 7 0 0 0 14 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 18v3M8.5 21h7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="meter meter-right" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></span>
    </button>
    <p id="mic-status" class="mic-status" role="status" aria-live="polite"></p>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
